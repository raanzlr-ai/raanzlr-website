<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>404 — Page Not Found · Raanzlr</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg: #050505; --fg: #ffffff; --muted: rgba(255,255,255,.6); --cyan: #22d3ee; --line: rgba(255,255,255,.12); }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 2rem; text-align: center;
        background-image:
          radial-gradient(60% 60% at 70% 0%, rgba(34,211,238,.10), transparent 70%),
          radial-gradient(50% 50% at 20% 100%, rgba(34,211,238,.06), transparent 70%);
      }
      .wrap { max-width: 40rem; width: 100%; }
      .code { font-size: clamp(5rem, 18vw, 9rem); font-weight: 800; line-height: 1;
        background: linear-gradient(180deg, #fff, #8fdff0); -webkit-background-clip: text;
        background-clip: text; -webkit-text-fill-color: transparent; }
      h1 { font-size: clamp(1.5rem, 5vw, 2.25rem); font-weight: 700; margin-top: .5rem; letter-spacing: -.02em; }
      p { color: var(--muted); margin: 1rem auto 0; max-width: 28rem; line-height: 1.6; }
      .ar { direction: rtl; margin-top: .5rem; }
      .cta { margin-top: 2rem; display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
      .btn { display: inline-flex; align-items: center; gap: .4rem; text-decoration: none;
        border-radius: 999px; padding: .7rem 1.4rem; font-size: .95rem; font-weight: 600;
        transition: all .15s ease; }
      .btn-primary { background: var(--cyan); color: #04252b; }
      .btn-primary:hover { background: #3ee0f5; }
      .btn-ghost { border: 1px solid var(--line); color: var(--fg); }
      .btn-ghost:hover { border-color: rgba(34,211,238,.5); }
      .links { margin-top: 3.5rem; }
      .links-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .22em; color: rgba(255,255,255,.4); margin-bottom: 1rem; }
      .links-row { display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; }
      .chip { text-decoration: none; color: var(--muted); border: 1px solid var(--line);
        background: rgba(255,255,255,.02); border-radius: 999px; padding: .5rem 1rem; font-size: .875rem; transition: all .15s ease; }
      .chip:hover { border-color: rgba(34,211,238,.4); color: #fff; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
      <p class="ar">الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>

      <div class="cta">
        <a class="btn btn-primary" href="/en/">Back to Home</a>
        <a class="btn btn-ghost" href="/en/contact">Contact Us</a>
      </div>

      <div class="links">
        <div class="links-label">Helpful links</div>
        <div class="links-row">
          <a class="chip" href="/en/">Home</a>
          <a class="chip" href="/en/services">Services</a>
          <a class="chip" href="/en/insights">Insights</a>
          <a class="chip" href="/en/contact">Contact</a>
          <a class="chip" href="/en/industries">Industries</a>
          <a class="chip" href="/en/markets">Markets</a>
          <a class="chip" href="/en/faq">FAQ</a>
        </div>
        <div class="links-label" style="margin-top:1.75rem">روابط مفيدة</div>
        <div class="links-row ar">
          <a class="chip" href="/ar/">الرئيسية</a>
          <a class="chip" href="/ar/services">الخدمات</a>
          <a class="chip" href="/ar/insights">المدونة</a>
          <a class="chip" href="/ar/contact">تواصل معنا</a>
        </div>
      </div>
    </main>
  </body>
</html>
